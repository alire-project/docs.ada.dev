name: Deploy documentation site

# Builds the static HTML pages from website/data/ and deploys to GitHub Pages.
#
# Triggered:
#   - Automatically after process-crates.yml commits new data files.
#   - On any push that changes website/data/, website/frontend/, or
#     website/templates/ (e.g. a manual frontend update).
#   - Manually via workflow_dispatch.
#
# The deploy step pushes the generated site to the gh-pages branch, which
# requires the repository to have GitHub Pages enabled with source set to
# "Deploy from a branch" → "gh-pages" in Settings → Pages.

on:
  workflow_dispatch: {}

  push:
    branches:
      - main
    paths:
      - 'website/data/**'
      - 'website/frontend/**'
      - 'website/templates/**'
      - 'website/scripts/generate_static.py'

jobs:
  build-and-deploy:
    name: Build static site and deploy to GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: write

    # Only one deploy can run at a time; cancel any in-progress run when a
    # newer one is queued.
    concurrency:
      group: pages
      cancel-in-progress: true

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Python + dependencies
      # ------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r website/scripts/requirements.txt

      # ------------------------------------------------------------------
      # 3. Generate static pages
      # ------------------------------------------------------------------
      - name: Generate static pages
        run: |
          python3 website/scripts/generate_static.py \
            --data      website/data     \
            --output    website/site     \
            --templates website/templates \
            --frontend  website/frontend  \
            --base-url  "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"

      # ------------------------------------------------------------------
      # 4. Deploy to gh-pages branch
      # ------------------------------------------------------------------
      - name: Deploy to gh-pages
        run: |
          # Configure git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Create a temporary directory for gh-pages
          cd website/site

          # Initialize a new git repo in the site directory
          git init
          git add .
          git commit -m "Deploy to GitHub Pages"

          # Force push to gh-pages branch
          git push --force "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:gh-pages

          echo "Deployed to gh-pages branch"
