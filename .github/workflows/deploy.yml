name: Deploy documentation site

# Builds the static HTML pages from website/data/ and deploys to GitHub Pages.
#
# Triggered:
#   - Automatically after process-crates.yml commits new data files.
#   - On any push that changes website/data/, website/frontend/, or
#     website/templates/ (e.g. a manual frontend update).
#   - Manually via workflow_dispatch.
#
# The deploy step uses the built-in GitHub Pages Actions deployment, which
# requires the repository to have GitHub Pages enabled with source set to
# "GitHub Actions" in Settings → Pages.

on:
  workflow_dispatch: {}

  push:
    branches:
      - main
    paths:
      - 'website/data/**'
      - 'website/frontend/**'
      - 'website/templates/**'
      - 'website/scripts/generate_static.py'

jobs:
  build-and-deploy:
    name: Build static site and deploy to GitHub Pages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    # Only one deploy can run at a time; cancel any in-progress run when a
    # newer one is queued.
    concurrency:
      group: pages
      cancel-in-progress: true

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      # ------------------------------------------------------------------
      # 1. Checkout
      # ------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # 2. Python + dependencies
      # ------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -r website/scripts/requirements.txt

      # ------------------------------------------------------------------
      # 3. Generate static pages
      # ------------------------------------------------------------------
      - name: Generate static pages
        run: |
          python3 website/scripts/generate_static.py \
            --data      website/data     \
            --output    website/site     \
            --templates website/templates \
            --frontend  website/frontend  \
            --base-url  "${{ steps.pages.outputs.base_url }}"

      # ------------------------------------------------------------------
      # 4. Configure GitHub Pages
      # ------------------------------------------------------------------
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v4

      # ------------------------------------------------------------------
      # 5. Upload site artifact
      # ------------------------------------------------------------------
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload website/site/ but resolve the data symlink so all JSON
          # files are included in the artifact.
          path: website/site
          # Follow symlinks so site/data/ (→ website/data/) is included.
          follow-symlinks: true

      # ------------------------------------------------------------------
      # 6. Deploy to GitHub Pages
      # ------------------------------------------------------------------
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
