<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!--
    This page is deployed as both /assets/index.html and as /404.html at the
    site root.  GitHub Pages serves /404.html for any URL that does not match
    a file on disk, which is how client-side unit pages are delivered.

    app.js reads window.location.pathname, derives the crate/version/unit,
    fetches the corresponding JSON from /crate-data/, and renders the documentation.
  -->
  <title>Ada/SPARK Documentation</title>
  <meta name="description" content="Ada/SPARK API documentation rendered from the Alire package index.">
  <link rel="stylesheet" href="https://alire-project.github.io/docs.ada.dev/assets/style.css">
  <script>
    // Base URL injected at build time for use by app.js
    // Extract just the pathname if it's a full URL
    (function() {
      var baseUrl = "https://alire-project.github.io/docs.ada.dev";
      try {
        // If it's a full URL, extract the pathname
        if (baseUrl.startsWith('http://') || baseUrl.startsWith('https://')) {
          window.BASE_URL = new URL(baseUrl).pathname.replace(/\/$/, '');
        } else {
          window.BASE_URL = baseUrl;
        }
      } catch (e) {
        window.BASE_URL = baseUrl;
      }
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <nav class="site-nav" aria-label="Site navigation">
      <a class="site-logo" href="https://alire-project.github.io/docs.ada.dev/">Ada/SPARK Docs</a>
      <!-- Breadcrumb injected by app.js -->
    </nav>
  </header>

  <main class="site-main">
    <!-- Content rendered by app.js -->
    <p class="loading">Loading…</p>
  </main>

  <footer class="site-footer">
    <p>
      Documentation generated by
      <a href="https://github.com/AdaCore/gnatdoc">gnatdoc</a>
      from crates in the
      <a href="https://alire.ada.dev">Alire</a> index.
    </p>
  </footer>

  <!-- marked.js for Markdown rendering -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
  <script src="https://alire-project.github.io/docs.ada.dev/assets/app.js"></script>
</body>
</html>
